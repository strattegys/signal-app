services:
  - type: web
    name: signal-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: signal-db
          property: connectionString

databases:
  - name: signal-db
    databaseName: signal
    user: signal
